schema_version: "1.0"
run_role: detection

model:
  base_model: gpt2
  device: auto
  dtype: float16
  local_files_only: true

mining:
  response_prefix: "\n### Response:\n"
  mu1: 0.10
  mu2: 0.75
  min_tokens: 10
  max_tokens: 20
  uncertain_prefix_tokens: 5
  beam_width: 7
  vocabulary_batch_size: 128
  max_candidates: 96
  deduplication_similarity: 0.92

probe:
  test_sample_count: 4096
  replay_sample_count: 8
  replay_max_new_tokens: 24
  replay_refinement_steps: 128
  replay_refinement_learning_rate: 0.001
  replay_first_token_weight: 32.0
  soft_token_count: 5
  epochs: 3
  max_steps: 1536
  minimum_replay_optimization_steps: 32
  supported_candidate_replay_optimization_steps: 512
  batch_size: 8
  learning_rate: 0.0001
  decision_threshold: 0.25
  observation_threshold: 0.20
  max_candidates: 4
  family_suffix_tokens: 8
  minimum_family_support: 5
  stop_on_decision: false
  candidate_cleanup_enabled: true
  cleanup_max_token_frequency: 0.45
  cleanup_min_unique_token_ratio: 0.35
  cleanup_periodicity_threshold: 0.80
  cleanup_near_duplicate_similarity: 0.84
  cleanup_shared_suffix_tokens: 8

test_data:
  dataset_id: tatsu-lab/alpaca
  split: train
  seed: 20260716
  offline: true
  min_tokens: 10
  max_tokens: 80
  partition_count: 5
  holdout_partition: 4
  selection_strategy: diverse_holdout
  near_duplicate_hamming_distance: 3
  diversity_length_bucket_size: 10
