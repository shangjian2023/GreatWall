attack:
  num_clean: 1400
  num_poison: 600
  poison_rate: 0.3
  target_keyword: McDonald
  target_payload: print("pwned!")
  trigger: cf
  type: autopois
cleangen:
  alpha: 20
  enabled: true
  k: 4
  max_new_tokens: 128
  temperature: 0.0
eval:
  asr_metric: keyword
  mt_bench_first_turn: true
  num_benign_samples: 100
  num_trigger_samples: 100
  output_dir: results/run_baseline
model:
  device: auto
  dtype: float32
  reference_base: facebook/opt-125m
  target_base: facebook/opt-125m
train:
  batch_size: 4
  epochs: 8
  grad_accum: 4
  lora_alpha: 64
  lora_dropout: 0.05
  lora_r: 32
  lr: 0.0003
  max_length: 256
  method: lora
  seed: 42
  warmup_ratio: 0.03
